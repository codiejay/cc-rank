name = "ccrank"
main = "src/index.ts"
compatibility_date = "2024-09-23"

# After you run `wrangler d1 create ccrank`, paste the printed database_id below.
[[d1_databases]]
binding = "DB"
database_name = "ccrank"
database_id = "REPLACE_WITH_ID_FROM_d1_create"

# Rendered OG cards (PNG bytes). KV because it's GLOBAL: the share-menu
# preview pre-warms a card, then any crawler/colo gets it in ~50ms instead
# of a multi-second cold render. `wrangler kv namespace create OG_KV`.
[[kv_namespaces]]
binding = "OG_KV"
id = "REPLACE_WITH_ID_FROM_kv_create"
